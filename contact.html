<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Nom de l'agence</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <div class="logo">NA</div>
        <div>
          <strong>Nom de l'agence</strong><br>
          <small style="color:var(--muted);font-weight:600">Design & Développement</small>
        </div>
      </a>

      <nav class="nav" aria-label="Navigation principale">
        <a href="about.html">À propos</a>
        <a href="services.html">Services</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="contact.html">Contact</a>
        <a class="cta" href="contact.html">Obtenir un devis</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <div class="kicker">Contact</div>
      <h2>Entrons en contact</h2>
      <p class="lead">Remplissez le formulaire ci-dessous ou envoyez-nous un email directement à hello@agence.example</p>

      <form class="card" style="margin-top:18px" action="#" method="post" onsubmit="alert('Formulaire simulé — implémentez un endpoint serveur pour envoyer les données.'); return false;">
        <div class="form">
          <input class="input" type="text" name="name" placeholder="Nom complet" required>
          <input class="input" type="email" name="email" placeholder="Email" required>
          <input class="input" type="text" name="company" placeholder="Société (optionnel)">
          <input class="input" type="text" name="phone" placeholder="Téléphone (optionnel)">
          <select class="input" name="service" aria-label="Service">
            <option value="">Service recherché</option>
            <option>Stratégie</option>
            <option>Design</option>
            <option>Développement</option>
            <option>Maintenance</option>
          </select>
          <textarea name="message" placeholder="Décrivez rapidement votre projet..." required></textarea>
        </div>

        <div class="form-actions">
          <button type="reset" style="padding:10px 14px;border-radius:8px;border:1px solid rgba(13,27,42,0.06);background:#fff">Annuler</button>
          <button type="submit" class="cta">Envoyer</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer container">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div>
        <strong>Nom de l'agence</strong><br>
        <small class="lead">Design & Développement • Paris</small>
      </div>
      <div style="color:var(--muted)">© <span id="year"></span> — Tous droits réservés</div>
    </div>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
